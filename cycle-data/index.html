<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flowtel Cycle Data</title>
  <link rel="stylesheet" href="./styles.css?v=0.9.21" />
</head>
<body>
  <main class="cycle-dashboard-shell">
    <section class="hero-card">
      <p class="eyebrow" id="pageEyebrow">FLOW MAP</p>
      <h1 id="pageTitle">Cycle Data Dashboard</h1>
      <p id="dashboardIntro">Opening the dashboard...</p>
    </section>

    <section class="dashboard-card">
      <div class="dashboard-header">
        <div>
          <p class="eyebrow" id="viewEyebrow">CURRENT VIEW</p>
          <h2 id="viewingName">Loading...</h2>
        </div>
        <nav class="dashboard-actions" aria-label="Dashboard navigation">
          <a class="return-link" id="openFlowMapLink" href="/flow-map/">Open Flow Map</a>
          <a class="return-link" href="/client/?suite=1">Return to Suite</a>
          <a class="return-link" href="/manager/">Return to Concierge</a>
        </nav>
      </div>

      <div class="viewer-toggle" id="viewerToggle"></div>

      <section class="filters-card" id="filtersCard">
        <div>
          <p class="eyebrow">FILTERS</p>
          <h3 id="filtersTitle">Refine the view</h3>
        </div>
        <div class="filter-grid">
          <label>
            Season
            <select id="seasonFilter">
              <option value="">All Seasons</option>
              <option value="Inner Winter">Inner Winter</option>
              <option value="Inner Spring">Inner Spring</option>
              <option value="Inner Summer">Inner Summer</option>
              <option value="Inner Autumn">Inner Autumn</option>
            </select>
          </label>
          <label>
            Moon Phase
            <select id="moonPhaseFilter">
              <option value="">All Moon Phases</option>
            </select>
          </label>
          <label>
            Moon Cycle
            <select id="moonCycleFilter">
              <option value="">All Moon Cycles</option>
            </select>
          </label>
          <label>
            From
            <input id="startDateFilter" type="date" />
          </label>
          <label>
            To
            <input id="endDateFilter" type="date" />
          </label>
          <button type="button" id="clearFiltersButton">Clear Filters</button>
        </div>
      </section>

      <section class="snapshot-panel">
        <div>
          <p class="eyebrow">DATA SNAPSHOT</p>
          <h3 id="snapshotTitle">Flow Map foundation</h3>
          <p id="snapshotCopy">This page is the consent-aware home for mentor and client cycle data.</p>
        </div>
        <div class="metric-grid" id="metricGrid"></div>
      </section>

      <section class="flow-map-grid" id="flowMapGrid" aria-label="Seasonal Flow Map"></section>

      <section class="entry-log-card">
        <div class="section-heading-row">
          <div>
            <p class="eyebrow" id="entryEyebrow">CHECK-IN LOG</p>
            <h3 id="entryTitle">Entries</h3>
          </div>
          <p id="entryCount" class="entry-count"></p>
        </div>
        <div id="entryList" class="entry-list"></div>
      </section>

      <p id="dashboardMessage" class="message"></p>
    </section>
  </main>

  <script type="module" src="./app.js?v=0.9.21"></script>
</body>
</html>
