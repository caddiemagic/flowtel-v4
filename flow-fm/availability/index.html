<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Flow FM Inner Season availability for 1:1 client-facing calls." />
  <title>Client-Facing Calls | Flowtel</title>
  <link rel="stylesheet" href="/flow-fm/styles.css?v=0.10.73" />
  <link rel="stylesheet" href="/flow-fm/design-system.css?v=0.10.73" />
  <link rel="stylesheet" href="/flow-fm/availability/styles.css?v=0.10.73" />
</head>
<body class="availability-page">
  <main class="availability-shell">
    <nav class="top-nav" id="topNav" aria-label="Flow FM rooms"></nav>
    <section class="availability-hero flowfm-page-hero">
      <p class="eyebrow">FLOW FM AVAILABILITY</p>
      <h1>Client-facing calls.</h1>
      <p>Choose the weekly time windows you want to offer for 1:1 client-facing calls during each Inner Season. Every day begins offline and stays offline until you open it.</p>
    </section>
    <section class="availability-card" id="availabilityExperience" hidden>
      <header class="availability-heading">
        <div><p class="eyebrow">SEASONAL WEEKLY TEMPLATE</p><h2>Your Inner Season availability</h2><p id="availabilityAnchorCopy"></p></div>
        <a class="availability-link" href="/flow-fm/hourly-flow-rate/">Open Hourly Flow Rate</a>
      </header>
      <div id="availabilityGrid" class="availability-grid"></div>
      <p id="availabilityMessage" class="availability-message" role="status"></p>
    </section>
    <section class="availability-gate" id="availabilityGate" hidden></section>
  </main>
  <script type="module" src="/flow-fm/availability/page.js?v=0.10.73"></script>
</body>
</html>
