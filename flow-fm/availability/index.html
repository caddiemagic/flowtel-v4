<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Flow FM Inner Season availability for 1:1 client-facing calls." />
  <title>Availability | Flowtel</title>
  <link rel="stylesheet" href="/flow-fm/styles.css?v=0.10.76" />
  <link rel="stylesheet" href="/flow-fm/design-system.css?v=0.10.76" />
  <link rel="stylesheet" href="/flow-fm/availability/styles.css?v=0.10.76" />
  <link rel="stylesheet" href="/flow-fm/platform.css?v=0.10.76" />
</head>
<body class="flowfm-platform-page availability-page">
  <main class="availability-shell">
    <nav class="top-nav" id="topNav" aria-label="Flow FM rooms"></nav>
    <section class="availability-hero flowfm-page-hero">
      <p class="eyebrow">FLOW FM SCHEDULING PREFERENCE</p>
      <h1>Availability</h1>
      <p>Set the weekly time windows you prefer to offer during each Inner Season. This is a reusable preference template, not a live booking calendar.</p>
    </section>
    <section class="availability-card" id="availabilityExperience" hidden>
      <header class="availability-heading">
        <div><p class="eyebrow">SEASONAL WEEKLY TEMPLATE</p><h2>Inner Season availability</h2><p id="availabilityAnchorCopy"></p></div>
        <a class="availability-link" href="/flow-fm/hourly-flow-rate/">Open Hourly Flow Rate</a>
      </header>
      <div id="availabilityGrid" class="availability-grid"></div>
      <p id="availabilityMessage" class="availability-message" role="status"></p>
    </section>
    <section class="availability-gate" id="availabilityGate" hidden></section>
  </main>
  <script type="module" src="/flow-fm/availability/page.js?v=0.10.76"></script>
</body>
</html>
