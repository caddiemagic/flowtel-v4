<!doctype html>
<html lang="en">
<head>

  <link rel="stylesheet" href="/flow-fm/styles.css?v=0.10.8" />
</head>
<body>
  <main class="initiation-shell initiation-shell--simple">
    <nav class="top-nav top-nav--quiet" id="topNav"></nav>

    <section class="hall-hero-card hall-hero-card--compact">
      <div class="hall-hero-copy">
        <p class="eyebrow">EXPLORE</p>
        <h1>Moon Doors</h1>
        <p id="heroCopy">A quiet view of the initiations ahead, arranged around your entry moon.</p>
      </div>
    </section>

    <section class="moon-strip-card">
      <div class="section-heading compact section-heading--simple">
        <p class="eyebrow">YOUR PATH</p>

        <p>Flowtel keeps your current moon clear without locking the rooms ahead.</p>
      </div>
      <div class="moon-door-list" id="moonDoorList"></div>
    </section>

    <p id="message" class="message"></p>
