<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Flowtel Hourly Flow Rate — a private Flow FM receiving-standard experience." />
  <title>Hourly Flow Rate | Flowtel</title>
  <link rel="stylesheet" href="/flow-fm/styles.css?v=0.10.73" />
  <link rel="stylesheet" href="/flow-fm/design-system.css?v=0.10.73" />
  <link rel="stylesheet" href="/flow-fm/hourly-flow-rate/styles.css?v=0.10.73" />
</head>
<body class="hfr-page">
  <main class="hfr-shell">
    <nav class="top-nav" id="topNav" aria-label="Flow FM rooms"></nav>
    <section id="accessGate" class="hfr-access-gate" hidden></section>
    <div id="experience" hidden>
      <section id="rateHero" class="hfr-hero flowfm-page-hero" aria-live="polite"></section>
      <section id="currencyRoom" class="hfr-card hfr-currency-room"></section>
      <section class="hfr-card hfr-map-room">
        <div class="hfr-section-heading">
          <p class="eyebrow">YOUR SEASONAL SOVEREIGNTY MAP</p>
          <h2>Choose a place for every season.</h2>
          <p>If you could spend each season anywhere in the world, where would your body, creativity, and medicine feel most supported?</p>
        </div>
        <div id="seasonMap" class="hfr-season-map"></div>
      </section>
      <section id="seasonStudio" class="hfr-season-studio"></section>
      <section id="homeBaseRoom" class="hfr-card"></section>
      <section id="lifestyleLayersRoom" class="hfr-card"></section>
      <section id="timelineRoom" class="hfr-card"></section>
      <section id="witnessRoom" class="hfr-card"></section>
    </div>
    <p id="pageMessage" class="hfr-page-message" role="status" aria-live="polite"></p>
  </main>
  <script type="module" src="/flow-fm/hourly-flow-rate/page.js?v=0.10.75"></script>
</body>
</html>
