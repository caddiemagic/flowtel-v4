<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flow FM Priestess Profile Studio</title>
  <link rel="stylesheet" href="/flow-fm/styles.css?v=0.10.56" />
</head>
<body class="profile-studio-page">
  <main class="initiation-shell">
    <nav class="top-nav" id="topNav">
      <a class="nav-pill" href="/flow-fm/">Initiation Hall</a>
      <a class="nav-pill active" href="/flow-fm/profile-studio/">Profile Studio</a>
      <a class="nav-pill" href="/client/?suite=1">Return to Suite</a>
    </nav>
    <section id="accessState"></section>
    <section class="profile-studio-card profile-studio-card--simple profile-studio-card--elevated">
      <header class="section-heading compact profile-studio-heading">
        <h2>YOUR PRIESTESS PROFILE</h2>
        <p id="profileStudioIntro">You can return and refine this profile as often as your medicine evolves.</p>
      </header>
      <div class="profile-studio-layout">
        <div id="profileStudioForm" class="profile-studio-form"><p class="loading-note">Loading the Priestess Profile form...</p></div>
        <div id="profileStudioPreview" class="profile-studio-preview"><p class="loading-note">Loading the profile preview...</p></div>
      </div>
    </section>
    <section id="priestessMailboxSection" class="priestess-mailbox-card hidden" aria-live="polite"></section>
    <p id="message" class="message"></p>
  </main>
  <script type="module" src="/flow-fm/profile-studio/page.js?v=0.10.56"></script>
</body>
</html>
