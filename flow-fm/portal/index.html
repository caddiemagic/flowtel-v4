<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flow FM Moon Portal</title>
  <link rel="stylesheet" href="/flow-fm/styles.css?v=0.10.11" />
</head>
<body>
  <main class="initiation-shell initiation-shell--portal">
    <nav class="top-nav" id="topNav"></nav>

    <section class="hero-card hero-card--portal">
      <p class="eyebrow" id="portalEyebrow">MOON PORTAL</p>
      <h1 id="portalTitle">Opening Moon Portal</h1>
      <p id="portalIntro">Each moon portal gathers the initiation teaching, womb work, business assignment, and next doorway in one place.</p>
    </section>

    <section class="you-are-here-card">
      <div>
        <p class="eyebrow">YOU ARE HERE</p>
        <h2 id="hereTitle">Finding your current moon...</h2>
        <p id="hereCopy"></p>
      </div>
      <div class="next-actions-stack" id="portalActions"></div>
    </section>

    <section class="portal-layout">
      <article class="portal-panel portal-panel--moon" id="moonPanel"></article>
      <article class="portal-panel portal-panel--training" id="trainingPanel"></article>
      <article class="portal-panel portal-panel--assignment" id="assignmentPanel"></article>
    </section>


    <p id="message" class="message"></p>
  </main>
  <script type="module" src="/flow-fm/portal/page.js?v=0.10.13"></script>
